<template>

    <template if:true={isLoading}>
        <div style="margin-top: 9em;" class="slds-backdrop slds-backdrop_open">
            <div class="custom_spinner">
                <lightning-spinner alternative-text="Loading" variant="inverse" size="large"></lightning-spinner>
                <p class="custom_textLoad">Cargando, esto puede tardar un momento...</p>
            </div>
        </div>
    </template>

    <template if:true={init}>
        <template if:false={hasError}>
            <template if:true={buttonFinish}>
                <footer class="custom_fixed">
                    <lightning-button variant="brand" label="Finalizar" title="Finalizar" onclick={handleClickFinalizar} class="slds-m-left_x-small"></lightning-button>
                </footer>
                <div class="slds-grid slds-wrap custom_boxes">
                </div>
            </template>
            <div class="">
                <template if:true={toUpdate}>
                    <div class="slds-grid slds-wrap ">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                            <c-gestion-caso-parent-case-spanish prefill='{prefill}' layout="lightning"></c-gestion-caso-parent-case-spanish>
                        </div>
                        <template if:true={toUpdateSummaryList}>
                            <div style="padding-left: 15px;padding-bottom: 10px;" class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                                <c-gestion-caso--summary-list-spanish prefill='{prefillChilList}' layout="lightning"></c-gestion-caso--summary-list-spanish>
                            </div>
                        </template>
                        <template if:false={toUpdateSummaryList}>
                            <div style="padding-left: 15px;padding-bottom: 10px;" class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                                <c-gestion-caso--summary-list-spanish prefill='{prefillChilList}' layout="lightning"></c-gestion-caso--summary-list-spanish>
                            </div>
                        </template>

                    </div>
                </template>

                <template if:false={toUpdate}>
                    <div class="slds-grid slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                            <c-gestion-caso-parent-case-spanish prefill='{prefill}' layout="lightning"></c-gestion-caso-parent-case-spanish>
                        </div>
                        <template if:true={toUpdateSummaryList}>
                            <div style="padding-left: 15px;padding-bottom: 10px;" class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                                <c-gestion-caso--summary-list-spanish prefill='{prefillChilList}' layout="lightning"></c-gestion-caso--summary-list-spanish>
                            </div>
                        </template>
                        <template if:false={toUpdateSummaryList}>
                            <div style="padding-left: 15px;padding-bottom: 10px;" class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_6-of-12">
                                <c-gestion-caso--summary-list-spanish prefill='{prefillChilList}' layout="lightning"></c-gestion-caso--summary-list-spanish>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </template>
    <!-- modal start -->
    <template if:true={isShowModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- modal header start -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
                        onclick={hideModalBox}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small">
                        </lightning-icon>
                        <span class="slds-assistive-text">Cerrar</span>
                    </button>
                    <h2 id="modal-heading-001" class="slds-text-heading_medium slds-hyphenate">{modalTitle}</h2>
                </header>

                <!-- modal body start -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-01">
                    <p>{modalMessagge}</p>
                </div>

                <!-- modal footer start-->
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={hideModalBox}>Cancel</button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <!-- modal end -->
</template>
